<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodic Table</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Periodic Table</span>
        </div>
    </nav>
    <div class="container text-center">
        <div class="row">
            <div class="col-9 my-4" id="containerTable">
                <!-- Periodic Table -->
            </div>
            <div class="col-3 my-4">
                <table class="table caption-top">
                    <caption>Selected element information</caption>
                    <tbody>
                        <tr>
                            <th scope="row" class="text-start">Symbol</th>
                            <td id="elSymbol"class="text-start"></td>
                        </tr>
                        <tr>
                            <th scope="row" class="text-start">Name</th>
                            <td id="elName" class="text-start"></td>
                        </tr>
                        <tr>
                            <th scope="row" class="text-start">Number</th>
                            <td id="elNumber" class="text-start"></td>
                        </tr>
                        <tr>
                            <th scope="row" class="text-start">Configuration</th>
                            <td id="elElecConf" class="text-start"></td>
                        </tr>                        
                        <tr>
                            <th scope="row" class="text-start">
                                Atomic Mass
                                <a href="#" id="referenceAtomicMass">[*]</a>
                            </th>
                            <td id="elAtomMass" class="text-start"></td>
                        </tr>                        
                        <tr>
                            <th scope="row" class="text-start">
                                <a href="#" onclick="loadRadii()" class="link-secondary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">
                                    Show Radii
                                </a>
                            </th>
                            <td></td>
                        </tr>                        
                        <tr>
                            <th scope="row" class="text-start">
                                <a href="#" class="link-secondary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">
                                    Show Energies
                                </a>
                            </th>
                            <td></td>
                        </tr>                        
                    </tbody>
                </table>
            </div>

        </div>
        <div class="row">
            <div class="col-12 my-4">
                <table id="Information" class="table table-hover caption-top">
                    <thead></thead>
                    <tbody></tbody>
                </table>
                
            </div>
        </div>
    </div>

<!-- Modal about the references -->
    <div class="modal" id="referenceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Reference Information</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="referenceModalBody">
    <!--                here will be the table-->
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
